    <script>
        alert("___Tabuada com for___")
        let num_tab = parseInt(prompt("Digite um número para a tabuada: "));
        let tabuada = ""
        for (let i = 1; i <= 10; i++) {
            tabuada += `${num_tab} × ${i} = ${num_tab * i}\n`
        }
        alert(tabuada)
    </script>
